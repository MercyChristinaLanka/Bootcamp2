trigger:
- main

variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'environments/dev'
  SERVICE_CONNECTION: 'azure-terraform-conn'

stages:

# ================= INIT =================
- stage: Init
  displayName: "Terraform Init"

  jobs:
  - job: InitJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    # Install Terraform (IMPORTANT - each stage needs this)
    - task: TerraformInstaller@1
      displayName: "Install Terraform"
      inputs:
        terraformVersion: $(TF_VERSION)

    # Init with backend config
    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins_rg'
        backendAzureRmStorageAccountName: 'devbackendrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'


