trigger:
- main

variables:
  TF_VERSION: '1.5.0'
  SERVICE_CONNECTION: 'azure-terraform-conn'

stages:

# ================= DEBUG STAGE (IMPORTANT) =================
- stage: Debug
  displayName: "Debug Repo Structure"
  jobs:
  - job: DebugJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self

    - script: |
        echo "========== REPO ROOT =========="
        pwd

        echo "========== FULL REPO STRUCTURE =========="
        ls -R $(System.DefaultWorkingDirectory)
      displayName: "Show Repo Structure"

# ================= PLAN =================
- stage: Plan
  dependsOn: Debug
  jobs:
  - job: PlanJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: init
        workingDirectory: '$(System.DefaultWorkingDirectory)/Env/dev'
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins_rg'
        backendAzureRmStorageAccountName: 'devbackendrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: '$(System.DefaultWorkingDirectory)/Env/dev'
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
        commandOptions: '-var-file=dev.tfvars'

# ================= APPLY =================
- stage: Apply
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - job: ApplyJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: init
        workingDirectory: '$(System.DefaultWorkingDirectory)/Env/dev'
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins_rg'
        backendAzureRmStorageAccountName: 'devbackendrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: '$(System.DefaultWorkingDirectory)/Env/dev'
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
        commandOptions: '-auto-approve -var-file=dev.tfvars'