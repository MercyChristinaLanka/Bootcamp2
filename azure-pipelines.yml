trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.5.0'

- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: 'Env/dev'
    backendServiceArm: 'azure-terraform-conn'
    backendAzureRmResourceGroupName: 'jenkins_rg'
    backendAzureRmStorageAccountName: 'devbackendrg'
    backendAzureRmContainerName: 'mybackup'
    backendAzureRmKey: 'dev.tfstate'

- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: 'Env/dev'
    environmentServiceNameAzureRM: 'azure-terraform-conn'