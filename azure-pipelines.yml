steps:
- checkout: self

- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: '1.5.0'

- script: |
    echo "Checking Terraform install..."
    ls -R /opt/hostedtoolcache || true
    terraform version || true
    which terraform || true
  displayName: Debug Terraform Install

- task: TerraformTaskV4@4
  displayName: Terraform Init
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: $(WORKING_DIR)
    backendServiceArm: 'azure-terraform-conn'
    backendAzureRmResourceGroupName: 'jenkins_rg'
    backendAzureRmStorageAccountName: 'devbackendrg'
    backendAzureRmContainerName: 'mybackup'
    backendAzureRmKey: 'dev.tfstate'