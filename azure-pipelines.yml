trigger:
- master

variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'Env/dev'

stages:

- stage: Plan
  jobs:
  - job: PlanJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self
      clean: true

    - script: |
        find . -name "*.tf.txt" -delete
        find . -name "*.tfvars.txt" -delete
      displayName: "Clean old files"

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - script: |
        cd $(WORKING_DIR)

        echo "FILES AFTER CLEAN:"
        ls -la

        terraform init \
          -backend-config="resource_group_name=jenkins_rg" \
          -backend-config="storage_account_name=devbackendrg" \
          -backend-config="container_name=mybackup" \
          -backend-config="key=dev.tfstate"

        terraform plan -var-file=dev.tfvars
      displayName: "Terraform Plan"

- stage: Apply
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - job: ApplyJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self
      clean: true

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - script: |
        cd $(WORKING_DIR)

        terraform init \
          -backend-config="resource_group_name=jenkins_rg" \
          -backend-config="storage_account_name=devbackendrg" \
          -backend-config="container_name=mybackup" \
          -backend-config="key=dev.tfstate"

        terraform apply -auto-approve -var-file=dev.tfvars
      displayName: "Terraform Apply"