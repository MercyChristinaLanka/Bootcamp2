trigger:
- main

variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'Env/dev'
  TF_VARS_FILE: 'dev.tfvars'

stages:

# ================= INIT =================
- stage: Init
  displayName: "Terraform Init"
  jobs:
  - job: InitJob
    pool:
      vmImage: ubuntu-latest
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - script: |
        terraform version
        cd $(WORKING_DIR)
        terraform init \
          -backend-config="resource_group_name=jenkins-rg" \
          -backend-config="storage_account_name=devbackendrg" \
          -backend-config="container_name=mybackup" \
          -backend-config="key=dev.tfstate"
      displayName: "Terraform Init"

# ================= PLAN =================
- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: Init
  jobs:
  - job: PlanJob
    pool:
      vmImage: ubuntu-latest
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - script: |
        terraform version
        cd $(WORKING_DIR)
        terraform plan -var-file="$(TF_VARS_FILE)" -out=tfplan
      displayName: "Terraform Plan"

# ================= APPLY =================
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - job: ApplyJob
    pool:
      vmImage: ubuntu-latest
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - script: |
        terraform version
        cd $(WORKING_DIR)
        terraform apply -auto-approve tfplan
      displayName: "Terraform Apply"