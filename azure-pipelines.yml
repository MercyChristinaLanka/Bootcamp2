trigger:
- master

variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'Env/dev'
  SERVICE_CONNECTION: 'azure-terraform-conn'

stages:

# ================= INIT =================
- stage: Init
  jobs:
  - job: InitJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'devbackendrg'
        backendAzureRmStorageAccountName: 'devbackend123'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'


# ================= PLAN =================
- stage: Plan
  dependsOn: Init

  jobs:
  - job: PlanJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init (Plan)"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'devbackendrg'
        backendAzureRmStorageAccountName: 'devbackend123'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(WORKING_DIR)
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
        commandOptions: '-var-file=$(WORKING_DIR)/dev.tfvars'


# ================= APPLY =================
- stage: Apply
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - job: ApplyJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init (Apply)"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'devbackendrg'
        backendAzureRmStorageAccountName: 'devbackend123'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(WORKING_DIR)
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
        commandOptions: '-auto-approve -var-file=$(WORKING_DIR)/dev.tfvars'