trigger:
- main

variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'environments/dev'
  SERVICE_CONNECTION: 'terraform-azure-conn'

stages:

# ================= INIT =================
- stage: Init
  displayName: "Terraform Init"

  jobs:
  - job: InitJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 1.5.0

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: azure-terraform-conn
        backendAzureRmResourceGroupName: 'devbackendrg'
        backendAzureRmStorageAccountName: 'devbackendstorage123'
        backendAzureRmContainerName: 'myterrbackup'
        backendAzureRmKey: 'dev.tfstate'


     