trigger:
- main

variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'Env/dev'
  SERVICE_CONNECTION: 'azure-terraform-conn'

stages:

# ================= INIT =================
- stage: Init
  jobs:
  - job: InitJob
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins-rg'
        backendAzureRmStorageAccountName: 'devbackendrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

# ================= PLAN =================
- stage: Plan
  dependsOn: Init
  jobs:
  - job: PlanJob
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins-rg'
        backendAzureRmStorageAccountName: 'devbackendrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(WORKING_DIR)
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)

# ================= APPLY =================
- stage: Apply
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - job: ApplyJob
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins-rg'
        backendAzureRmStorageAccountName: 'devbackendsrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: $(WORKING_DIR)
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
        commandOptions: '-auto-approve'