pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

# 👇 ADD THIS RIGHT HERE
- script: |
    echo "Listing repo structure:"
    ls -R
  displayName: "Debug Repo Structure"

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.5.0'

- script: |
    terraform version
    terraform init
  workingDirectory: environments/dev
  displayName: "Terraform Init"