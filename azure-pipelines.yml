variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'Env/dev'
  SERVICE_CONNECTION: 'azure-terraform-conn'

stages:

# ================= PLAN =================
- stage: Plan
  jobs:
  - job: PlanJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self

    # ✅ FIX: Install Terraform explicitly
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins_rg'
        backendAzureRmStorageAccountName: 'devbackendrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(WORKING_DIR)
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)

# ================= APPLY =================
- stage: Apply
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - job: ApplyJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self

    # ✅ FIX: Install Terraform again in new job
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)
        backendAzureRmResourceGroupName: 'jenkins_rg'
        backendAzureRmStorageAccountName: 'devbackendrg'
        backendAzureRmContainerName: 'mybackup'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: $(WORKING_DIR)
        environmentServiceNameAzureRM: $(SERVICE_CONNECTION)
        commandOptions: '-auto-approve'